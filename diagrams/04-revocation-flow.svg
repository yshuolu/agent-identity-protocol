<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
    <marker id="arrow4r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <filter id="shadow4">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Revocation Flow</text>
  <text x="400" y="56" text-anchor="middle" font-size="13" fill="#64748b">Hybrid model — short TTL + periodic revocation list polling</text>

  <!-- Actors -->
  <rect x="40" y="80" width="140" height="60" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow4)"/>
  <text x="110" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">Master Human</text>
  <text x="110" y="126" text-anchor="middle" font-size="11" fill="#3b82f6">Kill switch</text>

  <rect x="260" y="80" width="140" height="60" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow4)"/>
  <text x="330" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#15803d">Identity Service</text>
  <text x="330" y="126" text-anchor="middle" font-size="11" fill="#22c55e">Revocation list</text>

  <rect x="470" y="80" width="140" height="60" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow4)"/>
  <text x="540" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#6d28d9">Provider</text>
  <text x="540" y="126" text-anchor="middle" font-size="11" fill="#8b5cf6">Polls revocations</text>

  <rect x="640" y="80" width="130" height="60" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow4)"/>
  <text x="705" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#b45309">Agent</text>
  <text x="705" y="126" text-anchor="middle" font-size="11" fill="#f59e0b">agt_7f3k9m2x</text>

  <!-- Lifelines -->
  <line x1="110" y1="140" x2="110" y2="510" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="330" y1="140" x2="330" y2="510" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="540" y1="140" x2="540" y2="510" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="705" y1="140" x2="705" y2="510" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Step 1: Revoke -->
  <line x1="180" y1="180" x2="320" y2="180" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow4r)"/>
  <rect x="155" y="164" width="190" height="28" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="250" y="183" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">1. POST /revoke { aid: "agt_7f3k..." }</text>

  <!-- Step 2: IS adds to list -->
  <rect x="265" y="210" width="130" height="50" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="330" y="230" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">2. Immediately</text>
  <text x="330" y="246" text-anchor="middle" font-size="10" fill="#ef4444">Add to revocation list</text>
  <text x="330" y="256" text-anchor="middle" font-size="10" fill="#ef4444">Invalidate refresh token</text>

  <!-- Step 3: Agent tries to refresh — denied -->
  <line x1="695" y1="296" x2="340" y2="296" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <rect x="420" y="282" width="200" height="28" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="520" y="301" text-anchor="middle" font-size="10" fill="#475569">3. Agent tries refresh → 401 Denied</text>

  <line x1="340" y1="310" x2="695" y2="310" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow4r)"/>

  <!-- Step 4: Provider polls revocation list -->
  <line x1="530" y1="360" x2="340" y2="360" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <rect x="355" y="346" width="170" height="28" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="440" y="365" text-anchor="middle" font-size="10" fill="#475569">4. Poll GET /revocations (every 5m)</text>

  <line x1="340" y1="378" x2="530" y2="378" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <rect x="345" y="382" width="200" height="24" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="445" y="399" text-anchor="middle" font-size="10" fill="#dc2626">Returns list including agt_7f3k9m2x</text>

  <!-- Step 5: Agent request denied -->
  <line x1="695" y1="436" x2="550" y2="436" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <rect x="580" y="422" width="145" height="28" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="652" y="441" text-anchor="middle" font-size="10" fill="#475569">5. Agent makes request</text>

  <line x1="550" y1="456" x2="695" y2="456" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow4r)"/>
  <rect x="562" y="458" width="156" height="24" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="640" y="474" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">401 aip_token_revoked</text>

  <!-- Timing note -->
  <rect x="40" y="497" width="385" height="30" rx="6" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  <text x="232" y="517" text-anchor="middle" font-size="11" fill="#92400e">Worst-case revocation lag = polling interval (default 5 min)</text>
</svg>
