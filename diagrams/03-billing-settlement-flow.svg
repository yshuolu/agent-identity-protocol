<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
    <marker id="arrow3g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow3b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="440" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Billing &amp; Settlement Flow</text>
  <text x="440" y="56" text-anchor="middle" font-size="13" fill="#64748b">Master funds IS once — IS settles to all providers. One payment relationship per party.</text>

  <!-- Actors -->
  <rect x="40" y="80" width="150" height="60" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow3)"/>
  <text x="115" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">Master Human</text>
  <text x="115" y="126" text-anchor="middle" font-size="11" fill="#3b82f6">Pays once</text>

  <rect x="290" y="80" width="150" height="60" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow3)"/>
  <text x="365" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#15803d">Identity Service</text>
  <text x="365" y="126" text-anchor="middle" font-size="11" fill="#22c55e">Clearinghouse</text>

  <rect x="540" y="80" width="150" height="60" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow3)"/>
  <text x="615" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#6d28d9">Provider A</text>
  <text x="615" y="126" text-anchor="middle" font-size="11" fill="#8b5cf6">Gets settled</text>

  <rect x="720" y="80" width="140" height="60" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow3)"/>
  <text x="790" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#6d28d9">Provider B</text>
  <text x="790" y="126" text-anchor="middle" font-size="11" fill="#8b5cf6">Gets settled</text>

  <!-- Lifelines -->
  <line x1="115" y1="140" x2="115" y2="590" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="365" y1="140" x2="365" y2="590" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="615" y1="140" x2="615" y2="590" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="790" y1="140" x2="790" y2="590" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Phase 1: Funding -->
  <rect x="20" y="165" width="850" height="75" rx="0" fill="#eff6ff" fill-opacity="0.4"/>
  <text x="40" y="182" font-size="11" font-weight="700" fill="#1e40af">PHASE 1 — FUNDING</text>

  <line x1="190" y1="208" x2="355" y2="208" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow3b)"/>
  <rect x="195" y="193" width="155" height="28" rx="4" fill="white" stroke="#bfdbfe" stroke-width="1"/>
  <text x="272" y="212" text-anchor="middle" font-size="10" fill="#1e40af">1. Fund $50 (card/auto-topup)</text>

  <!-- Credit box -->
  <rect x="310" y="168" width="110" height="24" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="365" y="184" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">Balance: $50.00</text>

  <!-- Phase 2: Usage -->
  <rect x="20" y="255" width="850" height="130" rx="0" fill="#faf5ff" fill-opacity="0.3"/>
  <text x="40" y="272" font-size="11" font-weight="700" fill="#6d28d9">PHASE 2 — USAGE REPORTING (async, batched)</text>

  <!-- Provider A reports -->
  <line x1="605" y1="300" x2="375" y2="300" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <rect x="400" y="286" width="200" height="28" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="305" text-anchor="middle" font-size="10" fill="#475569">2a. Report: aid used $3.00 of api.read</text>

  <!-- Provider B reports -->
  <line x1="780" y1="345" x2="375" y2="345" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <rect x="400" y="331" width="210" height="28" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="505" y="350" text-anchor="middle" font-size="10" fill="#475569">2b. Report: aid used $1.50 of llm.call</text>

  <!-- Deduction -->
  <rect x="310" y="362" width="110" height="24" rx="4" fill="#fef9c3" stroke="#fde047" stroke-width="1"/>
  <text x="365" y="378" text-anchor="middle" font-size="10" font-weight="600" fill="#a16207">Balance: $45.50</text>

  <!-- Phase 3: Settlement -->
  <rect x="20" y="400" width="850" height="105" rx="0" fill="#f0fdf4" fill-opacity="0.3"/>
  <text x="40" y="417" font-size="11" font-weight="700" fill="#15803d">PHASE 3 — SETTLEMENT (weekly/monthly)</text>

  <!-- Settle Provider A -->
  <line x1="375" y1="450" x2="605" y2="450" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow3g)"/>
  <rect x="400" y="436" width="200" height="28" rx="4" fill="white" stroke="#bbf7d0" stroke-width="1"/>
  <text x="500" y="455" text-anchor="middle" font-size="10" fill="#15803d">3a. Settle $285.00 (net of 5% fee)</text>

  <!-- Settle Provider B -->
  <line x1="375" y1="485" x2="780" y2="485" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow3g)"/>
  <rect x="430" y="471" width="220" height="28" rx="4" fill="white" stroke="#bbf7d0" stroke-width="1"/>
  <text x="540" y="490" text-anchor="middle" font-size="10" fill="#15803d">3b. Settle $142.50 (net of 5% fee) via Stripe</text>

  <!-- Key insight box -->
  <rect x="100" y="530" width="660" height="46" rx="8" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="430" y="550" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Master pays IS once. Providers get settled by IS. No cross-party payment setup.</text>
  <text x="430" y="568" text-anchor="middle" font-size="11" fill="#b45309">IS acts like an App Store / AWS Marketplace — clearing in the middle.</text>
</svg>
